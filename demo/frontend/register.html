<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — TA Recruitment</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <a href="index.html" class="sys-title" style="color: #fff; text-decoration: none">BUPT International School TA Recruitment System</a>
      </div>
    </header>

    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Register</h1>
        <p class="subtitle">Create an applicant or staff account.</p>
        <form id="form-register" action="#" method="post">
          <div class="form-group">
            <label for="reg-username">User Name</label>
            <input class="form-control" id="reg-username" name="username" type="text" required />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input class="form-control" id="reg-password" name="password" type="password" required />
          </div>
          <div class="form-group">
            <label for="reg-password2">Again Password</label>
            <input class="form-control" id="reg-password2" name="password2" type="password" required />
          </div>
          <div class="form-group">
            <label for="qm">QM Number</label>
            <input class="form-control" id="qm" name="qmNumber" type="text" placeholder="e.g. QM123456" />
          </div>
          <div class="form-group">
            <span>Choose Character:</span>
            <div class="role-row" style="margin-top: 0.5rem">
              <label><input type="radio" name="character" value="TA" checked /> TA</label>
              <label><input type="radio" name="character" value="MO" /> MO</label>
              <label><input type="radio" name="character" value="ADMIN" /> Admin</label>
            </div>
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" href="index.html">Return</a>
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
      document.getElementById("form-register").addEventListener("submit", function (e) {
        e.preventDefault();
        var u = document.getElementById("reg-username").value;
        var p = document.getElementById("reg-password").value;
        var p2 = document.getElementById("reg-password2").value;
        if (p !== p2) {
          alert("Passwords do not match");
          return;
        }
        var role = document.querySelector("#form-register input[name=character]:checked").value;
        var qm = document.getElementById("qm").value;
        window.taApi
          .register(u, p, role, qm)
          .then(function (data) {
            var r = data.user && data.user.role ? data.user.role : role;
            if (r === "TA") location.href = "ta/dashboard.html";
            else if (r === "MO") location.href = "mo/dashboard.html";
            else if (r === "ADMIN") location.href = "admin/dashboard.html";
            else location.href = "ta/dashboard.html";
          })
          .catch(function (err) {
            alert(err.message || "Register failed");
          });
      });
    </script>
  </body>
</html>
