<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Matching Dashboard (MO) — TA Recruitment</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <span class="sys-title">BUPT International School TA Recruitment System</span>
        <div class="sys-header__actions">
          <a class="btn btn-secondary" href="dashboard.html">Back to MO Dashboard</a>
        </div>
      </div>
    </header>

    <div class="dashboard__main" style="max-width: 1100px; margin: 0 auto; padding: 1.5rem">
      <h2 class="dashboard__title">AI Matching Dashboard (MO)</h2>

      <div class="panel ai-table" id="ai-matching-mo">
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Applicant</th>
                <th>Match Score</th>
                <th>Matched Skills</th>
                <th>Missing Skills</th>
                <th>AI Analysis</th>
              </tr>
            </thead>
            <tbody>
              <tr class="ai-matching-row" data-ai-score="90%" data-ai-matched="Java，Git✅" data-ai-missing="—" data-ai-note="Best match for posted Java/Git requirements; recommend interview on teaching experience.">
                <td><strong>Alice</strong></td>
                <td class="js-ai-cell-score"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-matched"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-missing"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-note"><span class="ai-pending">Pending analysis</span></td>
              </tr>
              <tr class="ai-matching-row" data-ai-score="50%" data-ai-matched="Java✅" data-ai-missing="Java，Git❌" data-ai-note="Partial overlap: strong Java, weak evidence on Git collaboration — pair with technical screen.">
                <td><strong>Bob</strong></td>
                <td class="js-ai-cell-score"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-matched"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-missing"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-note"><span class="ai-pending">Pending analysis</span></td>
              </tr>
              <tr class="ai-matching-row" data-ai-score="0%" data-ai-matched="—" data-ai-missing="Git ❌" data-ai-note="Does not meet minimum toolchain expectations for this posting unless upskilling plan is provided.">
                <td><strong>Charlie</strong></td>
                <td class="js-ai-cell-score"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-matched"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-missing"><span class="ai-pending">—</span></td>
                <td class="js-ai-cell-note"><span class="ai-pending">Pending analysis</span></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div class="form-actions" style="margin-top: 1.25rem; justify-content: center">
          <button type="button" class="btn btn-accent" id="ai-run-all-analysis">Run AI Analysis</button>
        </div>
      </div>
    </div>
    <script src="../js/main.js"></script>
  </body>
</html>
