<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login — TA Recruitment</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <a href="index.html" class="sys-title" style="color: #fff; text-decoration: none">BUPT International School TA Recruitment System</a>
      </div>
    </header>

    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Login</h1>
        <p class="subtitle">Sign in with your name or email.</p>
        <form id="form-login" action="#" method="post" autocomplete="on">
          <div class="form-group">
            <label for="login">Name / Email</label>
            <input class="form-control" id="login" name="login" type="text" autocomplete="username" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" required />
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" href="index.html">Return</a>
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
      document.getElementById("form-login").addEventListener("submit", function (e) {
        e.preventDefault();
        var login = document.getElementById("login").value.trim();
        var p = document.getElementById("password").value;
        window.taApi
          .login(login, p)
          .then(function (data) {
            var r = data.user && data.user.role ? data.user.role : "TA";
            if (r === "TA") location.href = "ta/dashboard.html";
            else if (r === "MO") location.href = "mo/dashboard.html";
            else if (r === "ADMIN") location.href = "admin/dashboard.html";
            else location.href = "ta/dashboard.html";
          })
          .catch(function (err) {
            alert(err.message || "Login failed");
          });
      });
    </script>
  </body>
</html>
