<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Application Detail — MO</title>
    <link rel="stylesheet" href="../css/main.css" />
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <span class="sys-title">BUPT International School TA Recruitment System</span>
        <a href="#" id="logout-btn" class="btn btn-secondary" style="font-size: 0.85rem">Logout</a>
      </div>
    </header>

    <div class="auth-wrap" style="padding-top: 2rem">
      <div class="auth-card" style="max-width: 860px">
        <h1>Application Detail</h1>
        <div class="table-wrap" style="margin-top: .5rem">
          <table class="data-table">
            <tbody id="app-detail-body"></tbody>
          </table>
        </div>
        <div class="form-actions" style="margin-top: 1rem">
          <button type="button" id="app-detail-back-btn" class="btn btn-secondary">Back</button>
        </div>
      </div>
    </div>

    <script src="../js/api.js"></script>
    <script>
      (function () {
        function escHtml(v) {
          return String(v == null ? "" : v)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function backToDashboard(jobId) {
          var q = jobId ? ("?section=applications&jobId=" + encodeURIComponent(jobId)) : "?section=applications";
          location.href = "dashboard.html" + q;
        }

        function renderRow(r) {
          var body = document.getElementById("app-detail-body");
          if (!body) return;
          var appId = r && r.applicationId != null ? String(r.applicationId) : "";
          var cvName = r && r.cvFileName ? String(r.cvFileName) : "-";
          var cvValue = cvName === "-"
            ? "-"
            : '<a href="' + escHtml(window.taApi.moApplicationCvViewUrl(appId)) + '" target="_blank" rel="noopener">' + escHtml(cvName) + "</a>";
          var fields = [
            ["Applicant Name", r.applicantName || "—"],
            ["Major", r.major || "—"],
            ["Education Background", r.educationBackground || r.major || "—"],
            ["Technical Ability", r.technicalAbility || "—"],
            ["Contact Information", r.contact || "—"],
            ["Application Status", String(r.status || "UPLOADED")],
          ];
          var rows = fields
            .map(function (kv) {
              return "<tr><th style=\"width:220px\">" + escHtml(kv[0]) + "</th><td>" + escHtml(kv[1]) + "</td></tr>";
            })
            .join("");
          rows += "<tr><th style=\"width:220px\">CV File</th><td>" + cvValue + "</td></tr>";
          body.innerHTML = rows;
        }

        var params = new URLSearchParams(location.search);
        var jobId = params.get("jobId");
        var appId = params.get("appId");
        if (!jobId || !appId) {
          alert("Missing job/application id.");
          backToDashboard(jobId);
          return;
        }

        window.taApi
          .moJobApplications(jobId)
          .then(function (res) {
            var rows = Array.isArray(res && res.applications) ? res.applications : [];
            var row = rows.find(function (x) {
              return String(x && x.applicationId != null ? x.applicationId : "") === String(appId);
            });
            if (!row) throw new Error("Application not found.");
            renderRow(row);
          })
          .catch(function (err) {
            alert(err.message || "Failed to load application detail.");
            backToDashboard(jobId);
          });

        document.getElementById("app-detail-back-btn").addEventListener("click", function () {
          backToDashboard(jobId);
        });

        document.getElementById("logout-btn").addEventListener("click", function (e) {
          e.preventDefault();
          window.taApi.logout().finally(function () {
            location.href = "../index.html";
          });
        });
      })();
    </script>
  </body>
</html>
