<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>BUPT International School TA Recruitment System</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <span class="sys-title">BUPT International School TA Recruitment System</span>
        <div class="sys-header__actions">
          <a class="btn btn-secondary" href="register.html">Register</a>
          <a class="btn btn-primary" href="login.html">Login</a>
        </div>
      </div>
    </header>

    <div class="auth-wrap">
      <div class="auth-card" style="max-width: 480px; text-align: center">
        <p class="auth-welcome">Welcome!</p>
        <p class="subtitle" style="margin-bottom: 2rem">
          Teaching Assistant recruitment for the International School — browse roles, upload your CV, and track applications.
        </p>
        <div class="form-actions" style="justify-content: center">
          <a class="btn btn-primary" href="register.html">Register</a>
          <a class="btn btn-secondary" href="login.html">Login</a>
        </div>
      </div>
    </div>

    <p class="page-footer-hint">Prototype UI — backend integration pending</p>
    <script src="js/main.js"></script>
  </body>
</html>
