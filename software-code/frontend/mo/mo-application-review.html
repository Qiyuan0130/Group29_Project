<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Application Review — MO</title>
    <link rel="stylesheet" href="../css/main.css" />
    <!-- MO Review Styles - ADDED -->
    <style>
      /* ===== MO Application Review Styles - ADDED ===== */
      .review-actions {
        display: flex;
        gap: 1rem;
        margin-top: 1.5rem;
        padding-top: 1.5rem;
        border-top: 2px solid var(--border, #e5e7eb);
      }
      .review-actions .btn {
        flex: 1;
        padding: 0.75rem 1.5rem;
        font-size: 1rem;
        font-weight: 600;
      }
      .btn-approve {
        background: linear-gradient(135deg, #2e7d32 0%, #4caf50 100%);
        color: white;
        border: none;
      }
      .btn-approve:hover:not(:disabled) {
        background: linear-gradient(135deg, #1b5e20 0%, #388e3c 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(46, 125, 50, 0.3);
      }
      .btn-reject {
        background: linear-gradient(135deg, #c62828 0%, #ef5350 100%);
        color: white;
        border: none;
      }
      .btn-reject:hover:not(:disabled) {
        background: linear-gradient(135deg, #b71c1c 0%, #d32f2f 100%);
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(198, 40, 40, 0.3);
      }
      .review-status-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 999px;
        font-weight: 600;
        font-size: 0.9rem;
        margin-bottom: 1rem;
      }
      .review-status-badge.status-accepted {
        background: rgba(46, 125, 50, 0.15);
        color: #2e7d32;
        border: 2px solid rgba(46, 125, 50, 0.3);
      }
      .review-status-badge.status-rejected {
        background: rgba(198, 40, 40, 0.15);
        color: #c62828;
        border: 2px solid rgba(198, 40, 40, 0.3);
      }
      .review-status-badge.status-pending {
        background: rgba(255, 160, 0, 0.15);
        color: #f57c00;
        border: 2px solid rgba(255, 160, 0, 0.3);
      }
      .review-note-box {
        background: #f8f9fa;
        border-left: 4px solid var(--accent, #0d47a1);
        padding: 1rem 1.25rem;
        margin: 1rem 0;
        border-radius: 0 8px 8px 0;
      }
      .review-note-box h4 {
        margin: 0 0 0.5rem 0;
        font-size: 0.9rem;
        color: var(--muted, #666);
      }
      .review-note-box p {
        margin: 0;
        color: #333;
        line-height: 1.6;
      }
      .review-timestamp {
        font-size: 0.8rem;
        color: var(--muted, #666);
        margin-top: 0.5rem;
      }
      /* Modal for confirmation */
      .review-modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
        opacity: 0;
        visibility: hidden;
        transition: all 0.2s ease;
      }
      .review-modal-overlay.active {
        opacity: 1;
        visibility: visible;
      }
      .review-modal-card {
        background: white;
        padding: 2rem;
        border-radius: 12px;
        max-width: 480px;
        width: 90%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        transform: scale(0.95);
        transition: transform 0.2s ease;
      }
      .review-modal-overlay.active .review-modal-card {
        transform: scale(1);
      }
      .review-modal-title {
        margin: 0 0 1rem 0;
        font-size: 1.25rem;
      }
      .review-modal-text {
        color: var(--muted, #666);
        margin-bottom: 1.5rem;
        line-height: 1.5;
      }
      .review-modal-actions {
        display: flex;
        gap: 0.75rem;
        justify-content: flex-end;
      }
      /* Toast notification */
      .mo-review-toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        background: #333;
        color: white;
        padding: 1rem 1.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        z-index: 2000;
        opacity: 0;
        transform: translateY(20px);
        transition: all 0.3s ease;
      }
      .mo-review-toast.show {
        opacity: 1;
        transform: translateY(0);
      }
      .mo-review-toast.success {
        background: #2e7d32;
      }
      .mo-review-toast.error {
        background: #c62828;
      }
    </style>
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <span class="sys-title">BUPT International School TA Recruitment System</span>
        <a href="#" id="logout-btn" class="btn btn-secondary" style="font-size: 0.85rem">Logout</a>
      </div>
    </header>

    <div class="auth-wrap" style="padding-top: 2rem">
      <div class="auth-card" style="max-width: 860px">
        <h1>Application Review</h1>
        
        <!-- ADDED: Status Badge -->
        <div id="review-status-container" class="review-status-badge status-pending">
          <span id="review-status-icon">⏳</span>
          <span id="review-status-text">Pending Review</span>
        </div>
        
        <!-- ADDED: Review Note Box -->
        <div id="review-note-box" class="review-note-box" style="display: none;">
          <h4>Review Decision</h4>
          <p id="review-note-text"></p>
          <div id="review-timestamp" class="review-timestamp"></div>
        </div>

        <div class="table-wrap" style="margin-top: .5rem">
          <table class="data-table">
            <tbody id="app-detail-body"></tbody>
          </table>
        </div>
        
        <!-- ADDED: Review Actions -->
        <div id="review-actions" class="review-actions">
          <button type="button" id="btn-approve" class="btn btn-approve">
            ✅ Approve Application
          </button>
          <button type="button" id="btn-reject" class="btn btn-reject">
            ❌ Reject Application
          </button>
        </div>
        
        <div class="form-actions" style="margin-top: 1rem">
          <button type="button" id="app-detail-back-btn" class="btn btn-secondary">Back</button>
        </div>
      </div>
    </div>

    <!-- ADDED: Confirmation Modal -->
    <div id="review-confirm-modal" class="review-modal-overlay">
      <div class="review-modal-card">
        <h3 id="modal-title" class="review-modal-title">Confirm Decision</h3>
        <p id="modal-text" class="review-modal-text">Are you sure you want to proceed?</p>
        <div class="review-modal-actions">
          <button type="button" id="modal-cancel" class="btn btn-secondary">Cancel</button>
          <button type="button" id="modal-confirm" class="btn btn-primary">Confirm</button>
        </div>
      </div>
    </div>

    <!-- ADDED: Toast -->
    <div id="mo-review-toast" class="mo-review-toast"></div>

    <script src="../js/api.js"></script>
    <!-- ADDED: MO Review API -->
    <script src="mo-review-api.js"></script>
    <script>
      (function () {
        // ===== ADDED: MO Review Functionality =====
        
        var currentAppId = null;
        var currentJobId = null;
        var currentStatus = 'UPLOADED';
        var pendingDecision = null;
        
        function escHtml(v) {
          return String(v == null ? "" : v)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
        }

        function backToDashboard(jobId) {
          var q = jobId ? ("?section=applications&jobId=" + encodeURIComponent(jobId)) : "?section=applications";
          location.href = "dashboard.html" + q;
        }

        function showToast(message, type) {
          var toast = document.getElementById("mo-review-toast");
          toast.textContent = message;
          toast.className = "mo-review-toast " + (type || "");
          toast.classList.add("show");
          setTimeout(function() {
            toast.classList.remove("show");
          }, 3000);
        }

        function updateStatusUI(status, reviewNote, reviewedAt) {
          currentStatus = status;
          var badge = document.getElementById("review-status-container");
          var icon = document.getElementById("review-status-icon");
          var text = document.getElementById("review-status-text");
          var actions = document.getElementById("review-actions");
          var noteBox = document.getElementById("review-note-box");
          var noteText = document.getElementById("review-note-text");
          var timestamp = document.getElementById("review-timestamp");
          
          badge.className = "review-status-badge";
          
          if (status === 'ACCEPTED' || status === 'ACCEPTED_BY_MO') {
            badge.classList.add("status-accepted");
            icon.textContent = "✅";
            text.textContent = "Approved";
            if (actions) actions.style.display = "none";
          } else if (status === 'REJECTED' || status === 'REJECTED_BY_MO') {
            badge.classList.add("status-rejected");
            icon.textContent = "❌";
            text.textContent = "Rejected";
            if (actions) actions.style.display = "none";
          } else {
            badge.classList.add("status-pending");
            icon.textContent = "⏳";
            text.textContent = "Pending Review";
            if (actions) actions.style.display = "flex";
          }
          
          if (reviewNote && noteBox) {
            noteBox.style.display = "block";
            noteText.textContent = reviewNote;
            if (reviewedAt) {
              var d = new Date(reviewedAt);
              timestamp.textContent = "Reviewed on: " + (Number.isNaN(d.getTime()) ? reviewedAt : d.toLocaleString());
            }
          }
        }

        function renderRow(r) {
          var body = document.getElementById("app-detail-body");
          if (!body) return;
          var appId = r && r.applicationId != null ? String(r.applicationId) : "";
          var cvName = r && r.cvFileName ? String(r.cvFileName) : "-";
          var cvValue = cvName === "-"
            ? "-"
            : '<a href="' + escHtml(window.taApi.moApplicationCvViewUrl(appId)) + '" target="_blank" rel="noopener">' + escHtml(cvName) + "</a>";
          
          // ADDED: Include review info if available
          var status = r.status || "UPLOADED";
          var statusClass = "status-pill status-pending";
          if (status === "ACCEPTED" || status === "ACCEPTED_BY_MO") statusClass = "status-pill status-approved";
          if (status === "REJECTED" || status === "REJECTED_BY_MO") statusClass = "status-pill status-rejected";
          
          var fields = [
            ["Applicant Name", r.applicantName || "—"],
            ["Major", r.major || "—"],
            ["Education Background", r.educationBackground || r.major || "—"],
            ["Technical Ability", r.technicalAbility || "—"],
            ["Contact Information", r.contact || "—"],
            ["Application Status", '<span class="' + statusClass + '">' + escHtml(status) + '</span>'],
          ];
          var rows = fields
            .map(function (kv) {
              return "<tr><th style=\"width:220px\">" + escHtml(kv[0]) + "</th><td>" + kv[1] + "</td></tr>";
            })
            .join("");
          rows += "<tr><th style=\"width:220px\">CV File</th><td>" + cvValue + "</td></tr>";
          body.innerHTML = rows;
          
          // Update status UI
          updateStatusUI(status, r.reviewNote, r.reviewedAt);
        }

        function openConfirmModal(title, text, onConfirm) {
          var modal = document.getElementById("review-confirm-modal");
          var titleEl = document.getElementById("modal-title");
          var textEl = document.getElementById("modal-text");
          var confirmBtn = document.getElementById("modal-confirm");
          var cancelBtn = document.getElementById("modal-cancel");
          
          titleEl.textContent = title;
          textEl.textContent = text;
          modal.classList.add("active");
          
          function handleConfirm() {
            closeModal();
            onConfirm();
          }
          
          function closeModal() {
            modal.classList.remove("active");
            confirmBtn.removeEventListener("click", handleConfirm);
            cancelBtn.removeEventListener("click", closeModal);
          }
          
          confirmBtn.addEventListener("click", handleConfirm);
          cancelBtn.addEventListener("click", closeModal);
        }

        function submitReview(decision) {
          if (!currentAppId) return;
          
          var btnApprove = document.getElementById("btn-approve");
          var btnReject = document.getElementById("btn-reject");
          
          btnApprove.disabled = true;
          btnReject.disabled = true;
          
          // Use the new API
          var apiFn = window.moReviewApi && window.moReviewApi.reviewApplication;
          if (!apiFn) {
            // Fallback: try to use generic api
            apiFn = function(appId, decision) {
              return fetch(window.taApi.url ? window.taApi.url("applications/" + appId + "/review") : "../api/applications/" + appId + "/review", {
                method: "POST",
                credentials: "same-origin",
                headers: { "Content-Type": "application/json;charset=UTF-8" },
                body: JSON.stringify({ decision: decision })
              }).then(function(res) {
                var ct = res.headers.get("Content-Type") || "";
                var isJson = ct.indexOf("application/json") !== -1;
                return (isJson ? res.json() : res.text()).then(function(data) {
                  if (!res.ok) throw new Error(data && data.error ? data.error : "Review failed");
                  return data;
                });
              });
            };
          }
          
          apiFn(currentAppId, decision)
            .then(function(result) {
              showToast("Application " + (decision === 'ACCEPT' ? "approved" : "rejected") + " successfully!", "success");
              updateStatusUI(
                decision === 'ACCEPT' ? 'ACCEPTED' : 'REJECTED',
                result.reviewNote || (decision === 'ACCEPT' ? "Application approved by MO" : "Application rejected by MO"),
                result.reviewedAt || new Date().toISOString()
              );
            })
            .catch(function(err) {
              showToast("Failed to submit review: " + err.message, "error");
              btnApprove.disabled = false;
              btnReject.disabled = false;
            });
        }

        var params = new URLSearchParams(location.search);
        var jobId = params.get("jobId");
        var appId = params.get("appId");
        currentJobId = jobId;
        currentAppId = appId;
        
        if (!jobId || !appId) {
          alert("Missing job/application id.");
          backToDashboard(jobId);
          return;
        }

        window.taApi
          .moJobApplications(jobId)
          .then(function (res) {
            var rows = Array.isArray(res && res.applications) ? res.applications : [];
            var row = rows.find(function (x) {
              return String(x && x.applicationId != null ? x.applicationId : "") === String(appId);
            });
            if (!row) throw new Error("Application not found.");
            renderRow(row);
          })
          .catch(function (err) {
            alert(err.message || "Failed to load application detail.");
            backToDashboard(jobId);
          });

        // ADDED: Event listeners for review buttons
        document.getElementById("btn-approve").addEventListener("click", function() {
          openConfirmModal(
            "Approve Application",
            "Are you sure you want to approve this application? The TA will be notified of your decision.",
            function() { submitReview('ACCEPT'); }
          );
        });

        document.getElementById("btn-reject").addEventListener("click", function() {
          openConfirmModal(
            "Reject Application",
            "Are you sure you want to reject this application? The TA will be notified of your decision.",
            function() { submitReview('REJECT'); }
          );
        });

        document.getElementById("app-detail-back-btn").addEventListener("click", function () {
          backToDashboard(jobId);
        });

        document.getElementById("logout-btn").addEventListener("click", function (e) {
          e.preventDefault();
          window.taApi.logout().finally(function () {
            location.href = "../index.html";
          });
        });
      })();
    </script>
  </body>
</html>
