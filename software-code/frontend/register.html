<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register — TA Recruitment</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <header class="sys-header">
      <div class="sys-header__inner">
        <a href="index.html" class="sys-title" style="color: #fff; text-decoration: none">BUPT International School TA Recruitment System</a>
      </div>
    </header>

    <div class="auth-wrap">
      <div class="auth-card">
        <h1>Register</h1>
        <p class="subtitle">Use name, email and password to create TA/MO/Admin account.</p>
        <form id="form-register" action="#" method="post">
          <div class="form-group">
            <label for="reg-role">Role</label>
            <select class="form-control" id="reg-role" name="role" required>
              <option value="TA" selected>TA</option>
              <option value="MO">MO</option>
              <option value="ADMIN">ADMIN</option>
            </select>
          </div>
          <div class="form-group">
            <label for="reg-name">Name</label>
            <input class="form-control" id="reg-name" name="name" type="text" required />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input
              class="form-control"
              id="reg-email"
              name="email"
              type="email"
              pattern="^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$"
              required
            />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <small style="display: block; color: #666">6-10 characters, include letters and numbers.</small>
            <input class="form-control" id="reg-password" name="password" type="password" required />
          </div>
          <div class="form-group">
            <label for="reg-password2">Again Password</label>
            <input class="form-control" id="reg-password2" name="password2" type="password" required />
          </div>
          <div class="form-group hidden" id="reg-mo-key-group">
            <label for="reg-mo-key">MO Key</label>
            <input class="form-control" id="reg-mo-key" name="moKey" type="text" placeholder="Only required for MO registration" />
          </div>
          <div class="form-group hidden" id="reg-admin-key-group">
            <label for="reg-admin-key">Admin Registration Key</label>
            <small style="display: block; color: #666">Required to register as Admin. Contact system administrator if you don't have the key.</small>
            <input class="form-control" id="reg-admin-key" name="adminKey" type="password" placeholder="Enter admin registration key" />
          </div>
          <div class="form-actions">
            <a class="btn btn-secondary" href="index.html">Return</a>
            <button type="submit" class="btn btn-primary">Submit</button>
          </div>
        </form>
      </div>
    </div>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script>
      function isValidName(name) {
        return /^[A-Za-z0-9]+$/.test(name);
      }
      function isValidEmail(email) {
        return /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/.test(email);
      }
      function isValidPassword(password) {
        return /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,10}$/.test(password);
      }
      function syncMoKeyVisibility() {
        var role = document.getElementById("reg-role").value;
        var moGroup = document.getElementById("reg-mo-key-group");
        var moInput = document.getElementById("reg-mo-key");
        var adminGroup = document.getElementById("reg-admin-key-group");
        var adminInput = document.getElementById("reg-admin-key");
        
        var isMo = role === "MO";
        var isAdmin = role === "ADMIN";
        
        // 处理MO密钥框
        moGroup.classList.toggle("hidden", !isMo);
        moInput.required = isMo;
        if (!isMo) moInput.value = "";
        
        // 处理Admin密钥框
        adminGroup.classList.toggle("hidden", !isAdmin);
        adminInput.required = isAdmin;
        if (!isAdmin) adminInput.value = "";
      }

      document.getElementById("reg-role").addEventListener("change", syncMoKeyVisibility);
      syncMoKeyVisibility();

      /**
       * 显示注册成功的模态框（不跳转页面）
       * @param role 注册的角色
       */
      function showRegistrationSuccessModal(role) {
        var roleDisplay = {
          'TA': '教学助理 (TA)',
          'MO': '模块管理员 (MO)',
          'ADMIN': '系统管理员 (Admin)'
        };
        
        // 创建模态框HTML
        var modalHTML = `
          <div id="success-modal" style="
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
          ">
            <div style="
              background: white;
              padding: 40px;
              border-radius: 8px;
              box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
              max-width: 500px;
              text-align: center;
              animation: slideUp 0.3s ease-out;
            ">
              <div style="font-size: 48px; margin-bottom: 20px;">✅</div>
              <h2 style="margin: 20px 0; color: #28a745;">注册成功！</h2>
              <p style="color: #666; margin: 15px 0;">
                欢迎注册成为 <strong>${roleDisplay[role] || role}</strong>
              </p>
              <p style="color: #999; font-size: 14px; margin: 15px 0;">
                你的账户已经创建，信息已加密保存。现在可以访问系统的相关功能。
              </p>
              <div style="margin-top: 30px; display: flex; gap: 10px; justify-content: center;">
                <button onclick="goToLogin()" style="
                  padding: 10px 30px;
                  background: #007bff;
                  color: white;
                  border: none;
                  border-radius: 4px;
                  cursor: pointer;
                  font-size: 14px;
                ">进入系统</button>
                <button onclick="closeModal()" style="
                  padding: 10px 30px;
                  background: #6c757d;
                  color: white;
                  border: none;
                  border-radius: 4px;
                  cursor: pointer;
                  font-size: 14px;
                ">返回主页</button>
              </div>
            </div>
          </div>
          <style>
            @keyframes slideUp {
              from { opacity: 0; transform: translateY(20px); }
              to { opacity: 1; transform: translateY(0); }
            }
          </style>
        `;
        
        // 向页面添加模态框
        var body = document.body;
        var modalDiv = document.createElement('div');
        modalDiv.innerHTML = modalHTML;
        body.appendChild(modalDiv);
        
        // 清空表单
        document.getElementById('form-register').reset();
        syncMoKeyVisibility();
      }
      
      function goToLogin() {
        location.href = 'login.html';
      }
      
      function closeModal() {
        var modal = document.getElementById('success-modal');
        if (modal) modal.parentNode.removeChild(modal);
        location.href = 'index.html';
      }

      document.getElementById("form-register").addEventListener("submit", function (e) {
        e.preventDefault();
        var role = document.getElementById("reg-role").value;
        var name = document.getElementById("reg-name").value.trim();
        var email = document.getElementById("reg-email").value.trim();
        var emailInput = document.getElementById("reg-email");
        var p = document.getElementById("reg-password").value;
        var p2 = document.getElementById("reg-password2").value;
        var moKey = document.getElementById("reg-mo-key").value.trim();
        var adminKey = document.getElementById("reg-admin-key").value.trim();
        if (["TA", "MO", "ADMIN"].indexOf(role) === -1) {
          alert("Invalid role.");
          return;
        }
        if (role === "MO" && moKey !== "qwert1234") {
          alert("Invalid key. Registration not allowed.");
          return;
        }
        if (role === "ADMIN" && (!adminKey || adminKey === "")) {
          alert("Admin registration key is required. Registration not allowed.");
          return;
        }
        if (!isValidName(name)) {
          alert("Name may only contain letters and numbers.");
          return;
        }
        if (!isValidEmail(email)) {
          alert("Invalid email format.");
          emailInput.focus();
          emailInput.setCustomValidity("Invalid email format.");
          emailInput.reportValidity();
          return;
        }
        emailInput.setCustomValidity("");
        if (!isValidPassword(p)) {
          alert("Password must be 6–10 characters and include both letters and numbers.");
          return;
        }
        if (p !== p2) {
          alert("Passwords do not match");
          return;
        }
        window.taApi
          .register(name, email, p, role, moKey, adminKey)
          .then(function () {
            // 注册成功 - 弹出提示而不是跳转页面
            showRegistrationSuccessModal(role);
          })
          .catch(function (err) {
            alert(err.message || "Register failed");
          });
      });
    </script>
  </body>
</html>
